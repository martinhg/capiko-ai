name: E2E

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Drives the real capiko-ai binary through the headless install/sync/uninstall
  # lifecycle against a fake Copilot host (no real Copilot needed), asserting exit
  # codes and on-disk state. Build-tagged `e2e` so the main CI gate stays fast.
  e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Headless e2e
        run: go test -tags e2e -run E2E ./cmd/capiko-ai/ -v
