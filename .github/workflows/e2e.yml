name: E2E

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Drives the real capiko-ai binary through the headless install/sync/uninstall
  # lifecycle against a fake Copilot host (no real Copilot needed), asserting exit
  # codes and on-disk state. Build-tagged `e2e` so the main CI gate stays fast.
  e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Headless e2e
        run: go test -tags e2e -run E2E ./cmd/capiko-ai/ -v
